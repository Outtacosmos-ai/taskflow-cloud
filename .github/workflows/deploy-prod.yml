name: Deploy — Production

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: taskflow-prod
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & push images to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/taskflow-backend:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/taskflow-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/taskflow-frontend:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/taskflow-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/taskflow-worker:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/taskflow-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EKS (prod)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Render and apply manifests
        run: |
          sed -i "s|BACKEND_IMAGE|${{ env.ECR_REGISTRY }}/taskflow-backend:${{ env.IMAGE_TAG }}|g" k8s/base/backend.yaml
          sed -i "s|FRONTEND_IMAGE|${{ env.ECR_REGISTRY }}/taskflow-frontend:${{ env.IMAGE_TAG }}|g" k8s/base/frontend.yaml
          sed -i "s|WORKER_IMAGE|${{ env.ECR_REGISTRY }}/taskflow-worker:${{ env.IMAGE_TAG }}|g" k8s/base/worker.yaml
          kubectl apply -k k8s/overlays/prod

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/backend  -n taskflow --timeout=10m
          kubectl rollout status deployment/frontend -n taskflow --timeout=10m
          kubectl rollout status deployment/worker   -n taskflow --timeout=10m
