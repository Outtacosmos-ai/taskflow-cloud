apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: taskflow
  labels:
    app: worker
    app.kubernetes.io/part-of: taskflow-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: WORKER_IMAGE  # replaced by CI/CD
          envFrom:
            - secretRef:
                name: worker-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
